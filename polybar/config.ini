[colors]
; background = #282A2E
; background-alt = #373B41
; foreground = #C5C8C6
; primary = #F0C674
; secondary = #8ABEB7
; alert = #A54242
; disabled = #707880

background = #2B2B2B
; background = #000000
background-alt = #285577
foreground = #C5C8C6
primary = #F0C674
secondary = #4C7899
alert = #A54242
disabled = #707880

[bar/x580vd]
width = 100%
height = 15pt
radius = 0
bottom = true
; dpi = 96
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 3pt
border-size = 0pt
border-color = #00000000
padding-left = 1
padding-right = 1
module-margin = 1
separator = |
separator-foreground = ${colors.disabled}
font-0 = Ubuntu:size=10;2
font-1 = "Noto Color Emoji:size=10:style=Regular:scale=10;2"
font-2 = Symbols Nerd Font:size=10;3
; modules-left = rofi xworkspaces
modules-left = rofi xworkspaces xwindow i3
; modules-right = filesystem pulseaudio xkeyboard memory cpu wlan eth date
; modules-right = xkeyboard pulseaudio filesystem memory cpu temperature wlan battery date
modules-right = pomo wlan eth temperature cpu memory filesystem pulseaudio battery xkeyboard date
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
tray-position = right
; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3
; override-redirect = true

[module/pomo]
type = custom/script
exec = pomo
exec-if = command -v pomo
interval = 1
interval-if = 86400
interval-fail = 86400

click-left = "[ $(pomo started) ] && pomo stop || pomo start"

[module/rofi]
type = custom/ipc

format = <output>
format-foreground = ${colors.secondary}

hook-0 = echo ÔĆÉ
hook-1 = rofi -show drun; echo ÔĆÉ
click-left= "#rofi.hook.1"
initial = 1

[module/xworkspaces]
type = internal/xworkspaces

nname = i3WorkspaceName

label-active = %name%
label-active-background = ${colors.background-alt}
; label-active-underline= ${colors.primary}
label-active-padding = 2
label-occupied = %name%
label-occupied-padding = 2
label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 2
label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 2

[module/xwindow]
format-padding = 2
type = internal/xwindow
label = %title:0:100:...%

[module/i3]
type = internal/i3
format = <label-mode>

label-mode = %mode%
label-mode-padding = 2
label-mode-background = ${colors.background-alt}
format-padding = 2

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.foreground}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/pulseaudio]
type = internal/pulseaudio

; ÔĆÉ , nf-linux-archlinux

ramp-volume-0 = ūüĒą
ramp-volume-1 = ūüĒČ
ramp-volume-2 = ūüĒä
format-volume = <ramp-volume> <label-volume>

label-volume = %percentage%%

label-muted = ūüĒá muted
label-muted-foreground = ${colors.disabled}

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %free%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/memory]
type = internal/memory
interval = 3
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %used%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/temperature]
type = custom/script
exec = cpu-temp
interval = 2
interval-fail = 10

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/battery]
type = internal/battery
battery = BAT0
adapter = AC0
; ful-at = 98
label-charging = ‚ö°%percentage%%
label-full = ‚ö°%percentage%%
label-discharging = ÔČÄ %percentage%%
label-low = ÔČÄ %percentage%%

[module/wlan]
inherit = network-base
interface-type = wireless
interval = 1.0
; label-connected = %{F#F0C674}%ifname%%{F-} %essid% %downspeed% %upspeed%
; label-connected = %signal%% %downspeed% %upspeed%
label-connected = %downspeed% %upspeed%
format-disconnected = ""

[module/eth]
inherit = network-base
interface-type = wired
interval = 1.0
; label-connected = %downspeed% %upspeed% %{F#F0C674}%ifname%%{F-} %local_ip%
label-connected = %downspeed% %upspeed%
format-disconnected = ""

[module/date]
type = internal/date
interval = 1

date = %a, %b %d - %H:%M
date-alt = %Y-%m-%d - %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
