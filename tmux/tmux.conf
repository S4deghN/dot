# ---------------------------------------------------------------------
# options
# ---------------------------------------------------------------------
set-option -g default-shell "/usr/bin/bash"
set-option -sg escape-time 0
set-option -g focus-events on
# set -g set-titles on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g monitor-activity on
# don't detach tmux when killing a session
set -g detach-on-destroy off
set -g mouse on
# Increase scrollback buffer size from 2000 to 10000 lines
set -g history-limit 10000
# Increase tmux messages display duration from 750ms to 2s
set -g display-time 2000

# ---------------------------------------------------------------------
# keymaps
# ---------------------------------------------------------------------
set -g status-keys emacs

setw -g mode-keys vi
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi v send-keys -X begin-selection\; send-keys -X rectangle-off
bind-key -T copy-mode-vi C-v send-keys -X begin-selection\; send-keys -X rectangle-on

unbind C-b
set-option -g prefix C-a
# use a different prefix for nested
bind-key -n C-q send-prefix

bind S source-file ~/.config/tmux/tmux.conf\; display "sourced!"

bind c new-window -c "#{pane_current_path}"

unbind %
bind r split-window -h -c "#{pane_current_path}"
bind R split-window -h -c "#{pane_current_path}" -p 30

unbind '"'
bind b split-window -v -c "#{pane_current_path}"
bind B split-window -v -c "#{pane_current_path}" -p 25

bind x kill-pane
bind X kill-window
bind v choose-buffe

bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

# bind -n M-h previous-window
# bind -n M-l next-window
# bind Space last-window

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# Application bindings
bind-key f neww tmux-sessionizer
bind-key P neww "htop"

# ---------------------------------------------------------------------
# style
# ---------------------------------------------------------------------
# visual:    '#af5f5f'
# highlight: '#E6D78E'
# comment:   '#747C84'
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"

# set-window-option -g mode-style bg='#af5f5f',fg=black
# set-window-option -g mode-style bg=white,fg='#13151A',bold

# disable status!
# set -g status
set-option -g status-position top
set -g status-interval 1
# set -g status-right "[#[fg=orange]#(uname -n)#[fg=default]]"
# set -g status-right "  🏡  "
# set -g status-right "#(date '+%Y-%m-%d - %H:%M:%S') "
set -g status-right "%H:%M:%S - %a, %b %-e [#[fg=yellow]#(uname -n)#[fg=default]]"
set-option -g pane-active-border-style fg='#1F242A'
set-option -g pane-border-style fg='#1F242A'

# setw -g window-status-current-style "fg=white,bold"
# set -g status-bg default

set -g status-style bg='black',fg='white'
set -g status-left "#[fg=white][#S]#[fg=default]"
set -g status-left-length 25

set -g window-status-current-format "#[fg=brightwhite,bold] #I.#W#[fg=default]"
set -g window-status-format " #I.#W"
set -g window-status-activity-style reverse
