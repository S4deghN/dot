# Setting up the colors and copy/paste
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
# set-option -g set-titles on

set-option -g default-shell "/usr/bin/fish"

# set-option -g default-terminal "screen-256color"
set-option -sg escape-time 10
set-option -g focus-events on
set -g base-index 1
setw -g pane-base-index 1

# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

setw -g mode-keys vi
unbind-key -T copy-mode-vi v
bind-key -T copy-mode-vi v send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi C-v send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi y send -X copy-selection      # Yank selection in copy mode.

set -g mouse on


# style
# set -g status-style "fg=#7c6f64"
# set -g status-style "bg=#2C2E2F"
set -g status-style "fg=white"
setw -g window-status-current-style "fg=white,bold"
set -g status-bg default
set-option -g status-position top
set -g status-interval 1
# set -g status-right "[#[fg=orange]#(uname -n)#[fg=default]]"
# set -g status-right "  🏡  "
# set -g status-right "#(date '+%Y-%m-%d - %H:%M:%S') "
set -g status-right "%H:%M:%S - %a, %b %-e [#(uname -n)]"
# set -g status

# # pane border
set-option -g pane-active-border-style fg=colour237 #bg1
set-option -g pane-border-style fg=colour237 #bg1


# bind S split-window tmux source ~/.tmux.conf
bind S source-file ~/.config/tmux/tmux.conf; display "~/.config/tmux/tmux.conf sourced!"

#
bind c new-window -c "#{pane_current_path}"

# Remap split horizontal from % to r
# split right
unbind %
bind r split-window -h -c "#{pane_current_path}"
bind R split-window -h -c "#{pane_current_path}" -p 30

# Remap split vertical from " to b
# split below
unbind '"'
bind b split-window -v -c "#{pane_current_path}"
bind B split-window -v -c "#{pane_current_path}" -p 25

bind x kill-pane

# Switch panes using the Meta key (usually Alt) prefix-free
bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

# bind -r C-up    resize-pane -U 1
# bind -r C-down  resize-pane -D 1
# bind -r C-left  resize-pane -L 1
# bind -r C-right resize-pane -R 1

bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

# Shift arrow to switch windows
bind -n M-h previous-window
bind -n M-l next-window

# Switch windows alt+number
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
