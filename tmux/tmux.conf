# ---------------------------------------------------------------------
# options
# ---------------------------------------------------------------------

set-option -g default-shell "/usr/bin/fish"
set-option -sg escape-time 0
set-option -g focus-events on
# set -g set-titles on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g monitor-activity on
# don't detach tmux when killing a session
set -g detach-on-destroy off
set -g mouse on

# ---------------------------------------------------------------------
# keymaps
# ---------------------------------------------------------------------
setw -g mode-keys vi
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi v send-keys -X begin-selection\; send-keys -X rectangle-off
bind-key -T copy-mode-vi C-v send-keys -X begin-selection\; send-keys -X rectangle-on

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

bind S source-file ~/.config/tmux/tmux.conf\; display "sources!"

bind-key s new-window tmux-sessionizer

bind c new-window -c "#{pane_current_path}"

unbind %
bind r split-window -h -c "#{pane_current_path}"
bind R split-window -h -c "#{pane_current_path}" -p 30

unbind '"'
bind b split-window -v -c "#{pane_current_path}"
bind B split-window -v -c "#{pane_current_path}" -p 25

bind x kill-pane
bind X kill-window
bind v choose-buffe

bind k select-pane -U
bind j select-pane -D
bind h select-pane -L
bind l select-pane -R

bind -r C-k resize-pane -U 1
bind -r C-j resize-pane -D 1
bind -r C-h resize-pane -L 1
bind -r C-l resize-pane -R 1

bind -n M-h previous-window
bind -n M-l next-window
bind Space last-window

bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# ---------------------------------------------------------------------
# style
# ---------------------------------------------------------------------
set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",*256col*:Tc"
# set -g status-style "fg=#7c6f64"
# set -g status-style "bg=#2C2E2F"
set -g status-style "fg=white"
setw -g window-status-current-style "fg=white,bold"
set -g status-bg default
set-option -g status-position top
set -g status-interval 1
# set -g status-right "[#[fg=orange]#(uname -n)#[fg=default]]"
# set -g status-right "  🏡  "
# set -g status-right "#(date '+%Y-%m-%d - %H:%M:%S') "
set -g status-right "%H:%M:%S - %a, %b %-e [#[fg=orange]#(uname -n)#[fg=default]]"
# set -g status
# # pane border
set-option -g pane-active-border-style fg=colour237 #bruvbox bg1
set-option -g pane-border-style fg=colour237 #bruvbox bg1
